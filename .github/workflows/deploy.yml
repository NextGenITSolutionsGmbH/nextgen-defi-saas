name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci-check:
    name: Wait for CI
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    steps:
      - name: Wait for CI workflow to succeed
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const checkName = 'Lint & Test';
            const maxAttempts = 60;
            const interval = 15000;

            for (let i = 0; i < maxAttempts; i++) {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha,
                check_name: checkName,
              });

              const check = data.check_runs[0];
              if (check) {
                console.log(`Attempt ${i + 1}: ${check.name} — status=${check.status}, conclusion=${check.conclusion}`);
                if (check.status === 'completed') {
                  if (check.conclusion === 'success') {
                    console.log('CI check passed!');
                    return;
                  }
                  throw new Error(`CI check failed with conclusion: ${check.conclusion}`);
                }
              } else {
                console.log(`Attempt ${i + 1}: Check "${checkName}" not found yet...`);
              }

              await new Promise(r => setTimeout(r, interval));
            }
            throw new Error('Timed out waiting for CI check');

  deploy:
    name: Deploy to Production
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 20
    needs: ci-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            COMMIT_SHA=${{ github.sha }}

      - name: Trigger Coolify deployment
        run: |
          # Use Coolify deploy webhook to trigger a full rebuild (not just restart)
          HTTP_STATUS=$(curl -s -o /tmp/coolify-response.json -w "%{http_code}" \
            "${{ secrets.COOLIFY_API_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}")

          echo "Coolify API responded with status: ${HTTP_STATUS}"
          cat /tmp/coolify-response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Coolify deployment trigger failed with HTTP ${HTTP_STATUS}"
            exit 1
          fi

          echo "Deployment triggered successfully."

      - name: Health check
        run: |
          APP_URL="${{ secrets.APP_URL }}"
          MAX_RETRIES=20
          RETRY_INTERVAL=15
          ATTEMPT=0

          echo "Waiting for application to become healthy at ${APP_URL}..."

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/${MAX_RETRIES}..."

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "${APP_URL}/api/health" || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)."
              exit 0
            fi

            echo "Health check returned HTTP ${HTTP_STATUS}. Retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done

          echo "::error::Health check failed after ${MAX_RETRIES} attempts."
          exit 1

      - name: Post deployment summary
        if: success()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** Deployed and healthy" >> "$GITHUB_STEP_SUMMARY"
