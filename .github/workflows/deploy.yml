name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ci-check:
    name: Wait for CI
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    steps:
      - name: Wait for CI workflow to succeed
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Lint & Test"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  deploy:
    name: Deploy to Production
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 20
    needs: ci-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            COMMIT_SHA=${{ github.sha }}

      - name: Trigger Coolify deployment
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/coolify-response.json -w "%{http_code}" \
            -X POST "${{ secrets.COOLIFY_API_URL }}/api/v1/applications/${{ secrets.COOLIFY_APP_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json")

          echo "Coolify API responded with status: ${HTTP_STATUS}"
          cat /tmp/coolify-response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Coolify deployment trigger failed with HTTP ${HTTP_STATUS}"
            exit 1
          fi

          echo "Deployment triggered successfully."

      - name: Health check
        run: |
          APP_URL="${{ secrets.COOLIFY_API_URL }}"
          MAX_RETRIES=20
          RETRY_INTERVAL=15
          ATTEMPT=0

          echo "Waiting for application to become healthy at ${APP_URL}..."

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt ${ATTEMPT}/${MAX_RETRIES}..."

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "${APP_URL}/api/health" || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)."
              exit 0
            fi

            echo "Health check returned HTTP ${HTTP_STATUS}. Retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done

          echo "::error::Health check failed after ${MAX_RETRIES} attempts."
          exit 1

      - name: Post deployment summary
        if: success()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** Deployed and healthy" >> "$GITHUB_STEP_SUMMARY"
