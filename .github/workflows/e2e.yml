name: E2E Tests

on:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  DATABASE_URL: postgresql://postgres:postgres@localhost:5434/defi_tracker_e2e
  REDIS_URL: redis://localhost:6381
  NODE_ENV: test

jobs:
  e2e:
    name: E2E & Accessibility
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: defi_tracker_e2e
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=10s

      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @defi-tracker/db exec prisma generate

      - name: Run database migrations
        run: pnpm --filter @defi-tracker/db exec prisma migrate deploy

      - name: Seed database
        run: pnpm --filter @defi-tracker/db exec prisma db seed

      - name: Build web application
        run: pnpm turbo build --filter=@defi-tracker/web

      - name: Install Playwright browsers
        run: pnpm dlx playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm turbo test:e2e

      - name: Run accessibility tests
        run: pnpm turbo test:a11y

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            **/playwright-report/
            **/test-results/
          retention-days: 14
