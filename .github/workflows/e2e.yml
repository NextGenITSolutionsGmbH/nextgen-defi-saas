name: E2E Tests

on:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  NODE_ENV: test
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/defi_tracker_e2e
  REDIS_URL: redis://localhost:6379
  NEXTAUTH_SECRET: e2e-test-secret-do-not-use-in-production
  NEXTAUTH_URL: http://localhost:3000

jobs:
  e2e:
    name: E2E & Accessibility
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30

    steps:
      - name: Start service containers
        run: |
          # Clean up any leftover containers from previous runs
          docker rm -f pg-e2e-${{ github.run_id }} redis-e2e-${{ github.run_id }} 2>/dev/null || true

          # Start PostgreSQL sharing runner's network namespace
          docker run -d --name pg-e2e-${{ github.run_id }} \
            --network container:$HOSTNAME \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=defi_tracker_e2e \
            postgres:16-alpine

          # Start Redis sharing runner's network namespace
          docker run -d --name redis-e2e-${{ github.run_id }} \
            --network container:$HOSTNAME \
            redis:7-alpine

          # Wait for PostgreSQL to be ready
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            docker exec pg-e2e-${{ github.run_id }} pg_isready -U postgres 2>/dev/null && break
            sleep 1
          done
          docker exec pg-e2e-${{ github.run_id }} pg_isready -U postgres

          # Wait for Redis to be ready
          echo "Waiting for Redis..."
          for i in $(seq 1 15); do
            docker exec redis-e2e-${{ github.run_id }} redis-cli ping 2>/dev/null && break
            sleep 1
          done

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @defi-tracker/db exec prisma generate

      - name: Run database migrations
        run: pnpm --filter @defi-tracker/db exec prisma migrate deploy

      - name: Seed database
        run: pnpm --filter @defi-tracker/db exec prisma db seed

      - name: Build web application
        run: pnpm turbo build --filter=@defi-tracker/web

      - name: Install Playwright system dependencies
        run: |
          # Switch apt to HTTPS (HTTP port 80 is firewalled on runner)
          if [ -f /etc/apt/sources.list ]; then
            sed -i 's|http://archive.ubuntu.com|https://archive.ubuntu.com|g' /etc/apt/sources.list
            sed -i 's|http://security.ubuntu.com|https://security.ubuntu.com|g' /etc/apt/sources.list
          fi
          apt-get update -y
          npx playwright install-deps chromium

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npx playwright test --config tests/e2e/playwright.config.ts
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            **/playwright-report/
            **/test-results/
          retention-days: 14

      - name: Cleanup service containers
        if: always()
        run: |
          docker rm -f pg-e2e-${{ github.run_id }} redis-e2e-${{ github.run_id }} 2>/dev/null || true
